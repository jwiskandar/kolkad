<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>KOLCARD — Admin Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap');
  * { box-sizing: border-box; }
  body { margin: 0; background: #14171F; font-family: 'Inter', sans-serif; color: #F3F1EA; }
  .disp { font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.04em; }
  .mono { font-family: 'JetBrains Mono', monospace; }
  input, select, button { font-family: inherit; }
  input:focus, select:focus, button:focus-visible { outline: 2px solid #FF3D68; outline-offset: 2px; }
  ::placeholder { color: #6B7080; }
  .wrap { max-width: 1100px; margin: 0 auto; padding: 28px 20px 80px; }
  .input {
    background: #1C2029; border: 1px solid #2C3140; border-radius: 10px;
    padding: 11px 14px; color: #F3F1EA; font-size: 14px;
  }
  .btn {
    background: none; border: 1px solid #2C3140; border-radius: 10px; padding: 10px 14px;
    color: #B8BEC9; cursor: pointer; font-size: 13px; font-weight: 600;
  }
  .btn:hover { border-color: #3A4058; }
  .btn-primary { background: #FF3D68; border: none; color: #14171F; font-weight: 700; }
  .chip {
    display: inline-flex; align-items: center; padding: 3px 9px; border-radius: 999px;
    background: #14171F; color: #8A8F9C; font-size: 11px; margin: 2px 4px 2px 0;
  }
  .card {
    background: #1C2029; border: 1px solid #2C3140; border-radius: 14px; padding: 18px;
    cursor: pointer; transition: border-color .15s ease;
  }
  .card:hover { border-color: #3A4058; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }
  .modal-bg {
    position: fixed; inset: 0; background: rgba(10,11,15,0.75); display: none;
    align-items: center; justify-content: center; padding: 20px; z-index: 50;
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: #1C2029; border: 1px solid #2C3140; border-radius: 16px; max-width: 560px;
    width: 100%; max-height: 85vh; overflow: auto; padding: 28px;
  }
  .field-label {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em;
    color: #8A8F9C; font-weight: 600; margin-bottom: 6px; display: block;
  }
  .detail-block { margin-bottom: 16px; }
  #gate {
    min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px;
  }
  #gate-inner { max-width: 360px; width: 100%; }
  @media (max-width: 480px) {
    .wrap { padding: 20px 14px 60px; }
    header h1.disp { font-size: 28px; }
  }
</style>
</head>
<body>

<div id="gate">
  <div id="gate-inner">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:20px;color:#8A8F9C;">
      <span class="mono" style="font-size:12px;letter-spacing:0.08em;">🔒 ADMIN LOGIN</span>
    </div>
    <input class="input" type="password" id="passcode-input" placeholder="Passcode" style="width:100%;margin-bottom:12px;" />
    <div id="gate-error" style="color:#FF6B7A;font-size:13px;margin-bottom:12px;display:none;">Incorrect passcode.</div>
    <button class="btn btn-primary" id="gate-submit" style="width:100%;padding:14px;">Unlock</button>
  </div>
</div>

<div id="app" style="display:none;">
  <div class="wrap">

        <option value="instagram">Instagram</option><option value="tiktok">TikTok</option>

      <select class="input" id="sort-select"><option value="newest">Newest</option><option value="name">Name A-Z</option><option value="followers">Most followers</option></select>

<script>
  // ⚠️ Set your own passcode here
  const ADMIN_PASSCODE = "@itisDONE80";
  const SHEET_ID = "1APw5t__bhsly2ubrcCH-9iwvaNL0hIXUldJk69KVjGA";
  const PUBLISHED_ID = "2PACX-1vTs59NpGLSn3q3r5zbIiGTEnEj22MPiAL_u5oF6nOnSuOj1Y0qEa01Sag-hQdJn_ii4G1ZAklwDPAUD";
  const GID = "0";

  document.getElementById("sheet-link").href = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/edit`;

  document.getElementById("gate-submit").onclick = () => {
    const val = document.getElementById("passcode-input").value;
    if (val === ADMIN_PASSCODE) {
      document.getElementById("gate").style.display = "none";
      document.getElementById("app").style.display = "block";
      loadData();
    } else {
      document.getElementById("gate-error").style.display = "block";
    }
  };
  document.getElementById("passcode-input").addEventListener("keydown", (e) => {
    if (e.key === "Enter") document.getElementById("gate-submit").click();
  });

  const COLUMNS = ["Timestamp","Name","Contact","Email","Category","Platforms","IG Handle","IG Followers","TikTok Handle","TikTok Followers","YouTube Handle","YouTube Followers","Content Links","Brand Experience","Rate Post","Rate Live","Rates Notes","Age Ranges","Gender Skew","Preferred Categories","Notes"];

  let rawEntries = [];

  function parseCSV(text) {
    const rows = [];
    let row = [], field = "", inQuotes = false;
    for (let i = 0; i < text.length; i++) {
      const c = text[i], next = text[i + 1];
      if (inQuotes) {
        if (c === '"' && next === '"') { field += '"'; i++; }
        else if (c === '"') { inQuotes = false; }
        else { field += c; }
      } else {
        if (c === '"') inQuotes = true;
        else if (c === ",") { row.push(field); field = ""; }
        else if (c === "\r") { /* skip */ }
        else if (c === "\n") { row.push(field); rows.push(row); row = []; field = ""; }
        else field += c;
      }
    }
    if (field.length || row.length) { row.push(field); rows.push(row); }
    return rows;
  }

  function loadData() {
    document.getElementById("loading").style.display = "block";
    document.getElementById("loading").textContent = "Loading roster...";
    document.getElementById("grid").innerHTML = "";
    const url = `https://docs.google.com/spreadsheets/d/e/${PUBLISHED_ID}/pub?output=csv&gid=${GID}&t=${Date.now()}`;
    fetch(url)
      .then(res => {
        if (!res.ok) throw new Error("Bad response");
        return res.text();
      })
      .then(text => {
        const rows = parseCSV(text);
        rawEntries = rows.map((r, i) => {
          const obj = { _id: i };
          COLUMNS.forEach((col, idx) => { obj[col] = r[idx] || ""; });
          return obj;
        }).filter(e => e.Name && e.Name.trim());
        document.getElementById("loading").style.display = "none";
        render();
      })
      .catch(() => {
        document.getElementById("loading").textContent = "Couldn't load data. Make sure File → Share → Publish to web is turned on for this Sheet.";
      });
  }

  function totalFollowers(e) {
    return (Number(e["IG Followers"]) || 0) + (Number(e["TikTok Followers"]) || 0) + (Number(e["YouTube Followers"]) || 0);
  }
  function fmtFollowers(n) {
    n = Number(n) || 0;
    if (n >= 1000000) return (n / 1000000).toFixed(1).replace(/\.0$/, "") + "M";
    if (n >= 1000) return (n / 1000).toFixed(1).replace(/\.0$/, "") + "K";
    return String(n);
  }

  function render() {
    const q = document.getElementById("search-input").value.toLowerCase();
    const catF = document.getElementById("category-filter").value;
    const platF = document.getElementById("platform-filter").value;
    const sortBy = document.getElementById("sort-select").value;

    let list = rawEntries.filter(e => {
      if (q && !`${e.Name} ${e.Contact} ${e["IG Handle"]} ${e["TikTok Handle"]} ${e["YouTube Handle"]}`.toLowerCase().includes(q)) return false;
      if (catF && e.Category !== catF) return false;
      if (platF && !(e.Platforms || "").toLowerCase().includes(platF)) return false;
      return true;
    });

    list = list.sort((a, b) => {
      if (sortBy === "followers") return totalFollowers(b) - totalFollowers(a);
      if (sortBy === "name") return (a.Name || "").localeCompare(b.Name || "");
      return b._id - a._id;
    });

    document.getElementById("count-label").textContent = `ADMIN — ${rawEntries.length} ON ROSTER`;
    const grid = document.getElementById("grid");
    grid.innerHTML = "";
    document.getElementById("empty").style.display = list.length === 0 ? "block" : "none";

    list.forEach((e, i) => {
      const card = document.createElement("div");
      card.className = "card";

      // Build per-platform rows: only show platforms the KOL actually filled in
      const platformRows = [];
      if (e["IG Handle"] || Number(e["IG Followers"]) > 0) {
        platformRows.push({ label: "Instagram", count: e["IG Followers"] });
      }
      if (e["TikTok Handle"] || Number(e["TikTok Followers"]) > 0) {
        platformRows.push({ label: "TikTok", count: e["TikTok Followers"] });
      }
      if (e["YouTube Handle"] || Number(e["YouTube Followers"]) > 0) {
        platformRows.push({ label: "YouTube", count: e["YouTube Followers"] });
      }
      // Also surface "Other" platforms from the free-form Platforms field (no follower count available)
      const otherPlatforms = (e.Platforms || "")
        .split("|")
        .map(p => p.split(":")[0].trim())
        .filter(p => p && !["instagram", "tiktok", "youtube"].includes(p.toLowerCase()));

      const platformHtml = platformRows.map(p => `
        <div style="display:flex;justify-content:space-between;font-size:12px;color:#B8BEC9;padding:3px 0;">
          <span>${escapeHtml(p.label)}</span>
          <span class="mono" style="color:#FFC857;">${fmtFollowers(p.count)}</span>
        </div>
      `).join("") + (otherPlatforms.length ? `
        <div style="font-size:11px;color:#565C6B;padding-top:4px;">
          + ${otherPlatforms.map(p => escapeHtml(p)).join(", ")}
        </div>
      ` : "");

      // Rates row: show whichever are filled
      const rateBits = [];
      if (e["Rate Post"]) rateBits.push(`Post <b class="mono" style="color:#F3F1EA;">${escapeHtml(e["Rate Post"])}</b>`);
      if (e["Rate Live"]) rateBits.push(`Live <b class="mono" style="color:#F3F1EA;">${escapeHtml(e["Rate Live"])}</b>`);
      const ratesHtml = rateBits.length ? `
        <div style="border-top:1px solid #2C3140;margin-top:12px;padding-top:10px;font-size:12px;color:#8A8F9C;">
          ${rateBits.join(" &nbsp;·&nbsp; ")}
        </div>
      ` : `
        <div style="border-top:1px solid #2C3140;margin-top:12px;padding-top:10px;font-size:11px;color:#565C6B;">
          No rates listed
        </div>
      `;

      card.innerHTML = `
        <div style="display:flex;justify-content:space-between;margin-bottom:12px;">
          <span class="mono" style="color:#4A4F5C;font-size:11px;">#${String(i + 1).padStart(3, "0")}</span>
          <span class="chip">${e.Category || "—"}</span>
        </div>
        <h3 class="disp" style="font-size:22px;margin:0 0 12px;">${escapeHtml(e.Name)}</h3>
        <div style="margin-bottom:10px;">${platformHtml || '<div style="font-size:12px;color:#565C6B;">No platforms listed</div>'}</div>
        <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-top:8px;">
          <div>
            <div class="mono" style="font-size:18px;color:#FFC857;font-weight:700;">${fmtFollowers(totalFollowers(e))}</div>
            <div style="font-size:10px;color:#565C6B;text-transform:uppercase;">total reach</div>
          </div>
        </div>
        ${ratesHtml}
      `;
      card.onclick = () => openModal(e);
      grid.appendChild(card);
    });
  }

  function escapeHtml(s) {
    return String(s || "").replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
  }

  function openModal(e) {
    const modal = document.getElementById("modal-content");
    modal.innerHTML = `
      <div style="display:flex;justify-content:space-between;margin-bottom:18px;">
        <div>
          <h2 class="disp" style="font-size:30px;margin:0;">${escapeHtml(e.Name)}</h2>
          <span style="color:#8A8F9C;font-size:13px;">${escapeHtml(e.Contact)} ${e.Email ? "· " + escapeHtml(e.Email) : ""}</span>
        </div>
        <button class="btn" onclick="document.getElementById('modal-bg').classList.remove('open')">✕</button>
      </div>
      <div class="detail-block"><span class="field-label">Category</span>${escapeHtml(e.Category)}</div>
      <div class="detail-block"><span class="field-label">Platforms</span>
        <div style="font-size:14px;color:#B8BEC9;">
          ${e["IG Handle"] ? `Instagram — ${escapeHtml(e["IG Handle"])} (${fmtFollowers(e["IG Followers"])})<br/>` : ""}
          ${e["TikTok Handle"] ? `TikTok — ${escapeHtml(e["TikTok Handle"])} (${fmtFollowers(e["TikTok Followers"])})<br/>` : ""}
          ${e["YouTube Handle"] ? `YouTube — ${escapeHtml(e["YouTube Handle"])} (${fmtFollowers(e["YouTube Followers"])})<br/>` : ""}
          ${e.Platforms ? `<span style="color:#565C6B;font-size:12px;">Other: ${escapeHtml(e.Platforms)}</span>` : ""}
        </div>
      </div>
      ${e["Content Links"] ? `<div class="detail-block"><span class="field-label">Content links</span><div style="font-size:13px;color:#FF3D68;word-break:break-all;">${escapeHtml(e["Content Links"]).replace(/\|/g, "<br/>")}</div></div>` : ""}
      ${e["Brand Experience"] ? `<div class="detail-block"><span class="field-label">Brand experience</span><p style="color:#B8BEC9;font-size:14px;">${escapeHtml(e["Brand Experience"])}</p></div>` : ""}
      <div class="detail-block"><span class="field-label">Rates</span>
        <div style="font-size:14px;color:#B8BEC9;">
          ${e["Rate Post"] ? `Post: <b style="color:#FFC857;">${escapeHtml(e["Rate Post"])}</b> ` : ""}
          ${e["Rate Live"] ? `Live: <b style="color:#FFC857;">${escapeHtml(e["Rate Live"])}</b>` : ""}
        </div>
        ${e["Rates Notes"] ? `<p style="color:#8A8F9C;font-size:13px;">${escapeHtml(e["Rates Notes"])}</p>` : ""}
      </div>
      ${e["Age Ranges"] || e["Gender Skew"] ? `<div class="detail-block"><span class="field-label">Audience</span><span style="font-size:14px;color:#B8BEC9;">${escapeHtml(e["Age Ranges"])} ${e["Gender Skew"] ? "· " + escapeHtml(e["Gender Skew"]) : ""}</span></div>` : ""}
      ${e["Preferred Categories"] ? `<div class="detail-block"><span class="field-label">Preferred categories</span><span style="font-size:14px;color:#B8BEC9;">${escapeHtml(e["Preferred Categories"])}</span></div>` : ""}
      ${e.Notes ? `<div class="detail-block"><span class="field-label">Notes</span><p style="color:#B8BEC9;font-size:14px;">${escapeHtml(e.Notes)}</p></div>` : ""}
      <div style="font-size:11px;color:#4A4F5C;margin-top:20px;">Submitted ${escapeHtml(e.Timestamp)}</div>
    `;
    document.getElementById("modal-bg").classList.add("open");
  }

  document.getElementById("modal-bg").onclick = (e) => {
    if (e.target.id === "modal-bg") e.target.classList.remove("open");
  };
  document.getElementById("search-input").oninput = render;
  document.getElementById("category-filter").onchange = render;
  document.getElementById("platform-filter").onchange = render;
  document.getElementById("sort-select").onchange = render;
  document.getElementById("refresh-btn").onclick = loadData;
</script>

</body>
</html>
